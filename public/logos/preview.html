<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RunningForm — Logo Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #030712;
      color: #f9fafb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 48px 32px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 48px;
    }
    .card {
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 40px 48px;
    }
    .card img { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <img src="logo-simple.svg" alt="RunningForm logo" />
  </div>
</body>
</html>

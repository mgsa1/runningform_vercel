<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100" width="280" height="100">
  <rect width="280" height="100" fill="#030712"/>

  <!-- Badge circle -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="#60a5fa" stroke-width="0.75" opacity="0.4"/>

  <!-- Tick marks at 3 and 9 o'clock -->
  <line x1="7" y1="50" x2="13" y2="50" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="87" y1="50" x2="93" y2="50" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>

  <!-- Arc text: "RUNNING" top -->
  <defs>
    <path id="top-arc" d="M 15,50 A 35,35 0 0,1 85,50"/>
    <path id="bottom-arc" d="M 22,68 A 35,35 0 0,0 78,68"/>
  </defs>
  <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8.5" font-weight="700" fill="white" letter-spacing="3.5">
    <textPath href="#top-arc" startOffset="8%">RUNNING</textPath>
  </text>
  <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8.5" font-weight="700" fill="#60a5fa" letter-spacing="5">
    <textPath href="#bottom-arc" startOffset="22%">FORM</textPath>
  </text>

  <!-- Runner icon inside (white stick figure, centered) -->
  <!-- Head -->
  <circle cx="50" cy="26" r="5" fill="white"/>
  <!-- Torso -->
  <line x1="50" y1="31" x2="47" y2="46" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Front arm -->
  <line x1="49" y1="36" x2="57" y2="40" stroke="white" stroke-width="1.75" stroke-linecap="round"/>
  <!-- Rear arm -->
  <line x1="49" y1="36" x2="42" y2="32" stroke="white" stroke-width="1.75" stroke-linecap="round"/>
  <!-- Front leg -->
  <line x1="47" y1="46" x2="54" y2="56" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="54" y1="56" x2="60" y2="62" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Rear leg -->
  <line x1="47" y1="46" x2="40" y2="57" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="57" x2="36" y2="62" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Wordmark to the right of the badge -->
  <text
    x="108"
    y="44"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="26"
    font-weight="700"
    letter-spacing="-0.5"
    fill="white"
  >Running</text>
  <text
    x="108"
    y="72"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="26"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#60a5fa"
  >Form</text>
</svg>
